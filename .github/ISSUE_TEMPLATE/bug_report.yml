name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report a bug!"

  - type: input
    id: summary
    attributes:
      label: What happened?
      placeholder: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Tap on ...
        3. See error
    validations:
      required: true

  - type: input
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Game Engine
        - Solo Mode
        - Online Mode
        - Play with Friend
        - Leaderboard
        - Auth / Game Center
        - UI / Themes
        - Ads / IAP
        - Other
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device & iOS version
      placeholder: e.g. iPhone 14, iOS 17.2
